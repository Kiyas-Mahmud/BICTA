# Render Blueprint — https://render.com/docs/blueprint-spec
#
# Free-tier deploy: no persistent disk (Render's free plan doesn't support
# one — that requires Starter+ and payment info on file). The SQLite
# database and uploaded images therefore live on the service's ephemeral
# filesystem and are WIPED on every redeploy and on every restart after the
# free instance spins down from inactivity (~15 min idle). Fine for a demo/
# preview; do not rely on this for data you want to keep. Migrations + seed
# run at the start of every boot since the filesystem starts empty each
# time — both are idempotent, safe to repeat.
services:
  - type: web
    name: bicta
    runtime: node
    plan: free
    branch: main
    buildCommand: npm install && npm run build
    startCommand: npx drizzle-kit migrate && npx tsx scripts/seed.ts && node .output/server/index.mjs
    healthCheckPath: /
    envVars:
      - key: NODE_ENV
        value: production
      - key: NUXT_SESSION_PASSWORD
        generateValue: true # Render generates a random 32+ char secret at provision time
      - key: ADMIN_NAME
        value: Admin
      - key: ADMIN_EMAIL
        sync: false # set in the Render dashboard — not stored in the repo
      - key: ADMIN_PASSWORD
        sync: false # set in the Render dashboard — min 12 chars, not a default value
